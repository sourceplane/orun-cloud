apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: integrations-worker
  description: Cloudflare Worker for the integrations bounded context — provider connections (GitHub App first), inbound delivery inbox, repo links, and the installation-token broker
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/integrations-worker
  dependsOn:
    - component: membership-worker
    - component: policy-worker
    - component: billing-worker
    - component: projects-worker
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6: identity/role inputs for the deploy lane's wire-credentials step.
    # Inert until this worker gets a wrangler template (fleet rollout, BF6b).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: multi-tenant-saas

    turboFilter: "@saas/integrations-worker"
    wranglerConfig: wrangler.jsonc
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/integrations-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/integrations-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: integrations
    runtime: cloudflare
