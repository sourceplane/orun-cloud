apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: policy-worker
  description: Cloudflare Worker for policy authorization decisions
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/policy-worker
  dependsOn:
    # Build inputs (dependsOn[].input, orun v2.22.0): these workspace packages
    # are bundled into this component's artifact, so a change to any of them
    # rescopes this component in --changed (no more stale-bundle deploy gaps).
    # Inert under the pinned orun v2.15.0; activates on the v2.22 CI cutover.
    - component: contracts
      input: true
    - component: policy-engine
      input: true
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6: identity/role inputs for the deploy lane's wire-credentials step.
    # Inert until this worker gets a wrangler template (fleet rollout, BF6b).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: orun-cloud

    turboFilter: "@saas/policy-worker"
    wranglerConfig: wrangler.jsonc
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/policy-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/policy-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: policy
    runtime: cloudflare
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
# ci: first deploy (BF6b convergence — binding-cycle seed)
# ci: re-scope to redeploy with the OP0 policy-engine bundle. PR #44 added
# `org.cli.link` (+ the rest of the OP0/OP2/OP3 state-plane actions) to the
# org-role permission maps and to ALL_KNOWN_ACTIONS in
# `packages/policy-engine`, but `orun plan --changed` only matches files under
# this component's `path: apps/policy-worker` — a packages/* change doesn't
# rescope its consumers. Result: policy-worker-stage was still serving its
# 2026-06-12 bundle (pre-OP0) and rejecting `org.cli.link` for every actor —
# including owners — which surfaced as the `orun cloud link` 404 (state-worker
# logs `reason: policy_denied` with role=owner and matching scope.orgId, yet
# policy-worker returns allow=false because the action isn't in its stale
# ALL_KNOWN_ACTIONS). Touching this file forces the next push-to-main to
# include policy-worker in the deploy set.
# ci: redeploy with the orun-work bundle. Same failure mode as above, third
# occurrence: PR #333 added `work.read`/`work.write` to the role maps and to
# ALL_KNOWN_ACTIONS in `packages/policy-engine`, but touched nothing under
# this component's path — so `orun plan --changed` never scheduled the deploy
# profile and prod kept serving the pre-work bundle. Every actor's `work.read`
# check denied as `unknown_action`, state-worker resource-hid the deny, and
# the console Work page rendered `not_found`. (web-console-next DID redeploy
# from the same PR — its files live under its own path — which is why the
# Work nav item shows while the API 404s.)
# ci: redeploy with the saas-event-streaming bundle. Fourth occurrence of the
# same failure mode: the epic (PRs #325/#331/#334/#338/#339/#345) added the
# whole event-streaming action set to the role maps and ALL_KNOWN_ACTIONS in
# `packages/policy-engine` — `dead_letter.read`/`dead_letter.replay` (ES1),
# `organization.notification_rule.read`/`.write` (ES2),
# `organization.notification_channel.read`/`.write` (ES3), and
# `organization.event.read`/`.ingest` (ES4/ES5) — but touched nothing under
# this component's `path`, so `orun plan --changed` never scheduled the deploy
# profile and prod kept serving the pre-event-streaming bundle. Every
# `organization.event.read` check denied as `unknown_action`, events-worker
# resource-hid the deny (leak-free 404), and the console Events explorer
# rendered `not_found` (web-console-next redeployed from its own path, so the
# Events nav shows while the API 404s — same signature as the Work page). This
# marker republishes the current bundle, unblocking Events + dead-letters +
# notification rules/channels in one deploy.
