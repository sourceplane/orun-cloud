apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: billing-worker
  description: Cloudflare Worker for the Billing API surface (private, service-binding only)
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/billing-worker
  dependsOn:
    - component: policy-worker
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6b: deploy-time wiring — wrangler.jsonc is rendered, never committed.
    # Verify lanes render from wiring.fixture.json (offline); deploy lanes
    # resolve real IDs from the Secrets Manager wiring manifest (BF5).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: orun-cloud

    # SS2: manifest key for the secrets-live escrow sync (saas-secrets-sync).
    secretsWorker: billing-worker
    turboFilter: "@saas/billing-worker"
    wranglerConfig: wrangler.jsonc
    wranglerTemplate: wrangler.template.jsonc
    wiringComponents: "cloudflare-hyperdrive"
    wiringEnvs: "stage,prod"
    wiringFixture: wiring.fixture.json
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/billing-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/billing-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: billing
    runtime: cloudflare
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
# ci: redeploy with live Hyperdrive wiring (BF6b convergence)
# ci: bootstrap deploy without service bindings (binding-cycle seed)
# ci: restore service bindings after binding-cycle seed
# ci: SS3 prod secrets seeded — redeploy to sync runtime secrets (secrets-live)
# ci: rotate POLAR_ACCESS_TOKEN/POLAR_WEBHOOK_SECRET — redeploy prod to sync from escrow (integrations/polar/prod)
