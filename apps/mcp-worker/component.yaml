apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: mcp-worker
  description: Cloudflare Worker serving the remote MCP transport (saas-mcp-server MCP2)
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/mcp-worker
  dependsOn:
    # Build inputs (dependsOn[].input): bundled into this component's artifact,
    # so a change to any rescopes this component in --changed.
    - component: contracts
      input: true
    - component: sdk
      input: true
    - component: mcp
      input: true
    # Runtime edge: the worker is a CLIENT of the public API (design §2), and
    # its egress rides a service binding to api-edge itself (the OAuth
    # authorization-server re-entry — a Worker cannot reach its own public
    # hostname). One-way (api-edge never binds mcp-worker), so a plain
    # ordering edge, not an acknowledged cycle: deploy api-edge first.
    - component: api-edge
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # Deploy-time wiring — wrangler.jsonc is rendered, never committed. The
    # template carries no @@wiring@@ tokens (vars only, no resource IDs), so the
    # fixture is empty; the render step still enforces the no-committed-IDs
    # guard. Served on workers.dev for now — the `mcp.<domain>` custom hostname
    # is an infra follow-up (tracked with MCP3).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: orun-cloud

    turboFilter: "@saas/mcp-worker"
    wranglerConfig: wrangler.jsonc
    wranglerTemplate: wrangler.template.jsonc
    wiringFixture: wiring.fixture.json
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/mcp-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/mcp-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: mcp
    runtime: cloudflare

# ci: force first deploy — MCP11. mcp-worker had never converged: the
# composition wire-live fix (#508) landed as a composition-source-only change
# that orun --changed did not rescope to this component, so its (first ever)
# deploy never ran. This trigger content-hashes the component into the changed
# set so verify-deploy runs with the corrected wire-live (renders vars-only
# workers from the fixture) and workers_dev:true (#507), bringing the advertised
# mcp-worker-<env>.workers.dev hostname online.
# ci: redeploy to pick up the @saas/mcp error-observability change (upstream
# HTTP status + URL now surfaced on mapped tool errors). @saas/mcp is a
# build-input of this worker but that edge is inert under the CI-pinned orun
# (< v2.22), so --changed would rescope only `mcp`; this trigger rescopes the
# worker so the live remote transport actually carries the new diagnostics.
# ci: redeploy for the whoami graceful-degradation fix in @saas/mcp (returns
# the workspace list with user:null for sk_/OAuth credentials instead of 401ing
# on the session-only /v1/auth/profile). Same inert build-input edge, so this
# trigger rescopes the worker to ship the corrected tool.
