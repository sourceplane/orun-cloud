apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: agents-worker
  description: Cloudflare Worker for the agent-session control plane (saas-agents)
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/agents-worker
  dependsOn:
    # Build inputs (dependsOn[].input): bundled into this component's artifact,
    # so a change to any rescopes this component in --changed.
    - component: contracts
      input: true
    - component: db
      input: true
    - component: membership-worker
    - component: policy-worker
    # AG12: provider-key custody rides the CONFIG_WORKER service binding, so
    # config-worker must exist before agents-worker deploys (Cloudflare 10143).
    - component: config-worker
    # AG6: agent-session token mint rides the IDENTITY_WORKER service binding.
    - component: identity-worker
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # Deploy-time wiring — wrangler.jsonc is rendered, never committed. Verify
    # lanes render from wiring.fixture.json (offline); deploy lanes resolve real
    # IDs from the Secrets Manager wiring manifest.
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: orun-cloud

    secretsWorker: agents-worker
    turboFilter: "@saas/agents-worker"
    wranglerConfig: wrangler.jsonc
    wranglerTemplate: wrangler.template.jsonc
    wiringComponents: "cloudflare-hyperdrive"
    wiringEnvs: "stage,prod"
    wiringFixture: wiring.fixture.json
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/agents-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/agents-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    # Every deploy-lane step must be an explicit command: an unset
    # preDeployCommand renders an empty script that fails the lane with a
    # bash syntax error — which is why agents-worker never deployed to
    # stage/prod from the AG12/AG6 merges (and, via the dependsOn edge,
    # blocked api-edge deploys).
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    # The agents schema migrates through infra/db-migrate like every other
    # context; nothing to run from the worker.
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: agents
    runtime: cloudflare
