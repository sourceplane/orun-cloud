apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: state-worker
  description: Cloudflare Worker for the state bounded context — Orun Cloud's run-coordination plane, content-addressed object/log store (R2), catalog heads, and workspace links. Dormant at OP0 (health-only); the state surface lands at OP2+.
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/state-worker
  dependsOn:
    - component: membership-worker
    - component: policy-worker
    - component: projects-worker
    - component: integrations-worker
    - component: config-worker
    - component: cloudflare-hyperdrive
    - component: cloudflare-r2
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6b: deploy-time wiring — wrangler.jsonc is rendered, never committed.
    # Verify lanes render from wiring.fixture.json (offline); deploy lanes
    # resolve real IDs from the Secrets Manager wiring manifest (BF5).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: orun-cloud

    # SS2: manifest key for the secrets-live escrow sync (saas-secrets-sync).
    # state-worker's STATE_ENCRYPTION_KEY is a deferred platform secret (seeded
    # at OP2+ when the state plane goes live); declared so the single-write-path
    # invariant holds — the secrets-live step is a no-op while deferred.
    secretsWorker: state-worker
    turboFilter: "@saas/state-worker"
    wranglerConfig: wrangler.jsonc
    wranglerTemplate: wrangler.template.jsonc
    wiringComponents: "cloudflare-hyperdrive"
    wiringEnvs: "stage,prod"
    wiringFixture: wiring.fixture.json
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/state-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/state-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: state
    runtime: cloudflare

# Deploy prerequisites: R2 enabled on the account + the orun-state bucket
# created by infra/terraform/cloudflare-r2 (state-worker binds it as
# ORUN_STATE on stage/prod). Re-scoped 2026-06-15 to converge the first live
# deploy after R2 was enabled.
# ci: re-scope to redeploy with the fixed @saas/db bundle. PR #58 fixed
# `listMissingObjects` (objects/missing 503 — `= ANY($array)` throws under the
# pg driver's fetch_types:false) in `packages/db`, but `orun plan --changed`
# only matches files under this component's `path: apps/state-worker` — a
# packages/* change doesn't rescope its consumers (same gotcha as PR #54). The
# deployed state-worker-stage bundle therefore still embeds the pre-fix @saas/db
# and keeps 503-ing on digest negotiation. Touching this file forces the next
# push-to-main to rebuild + redeploy state-worker with the fix.
# ci: re-scope again to redeploy with the @saas/db claim/runnable deps-guard +
# lease-interval fix (PR #60) — same packages/* → consumer rescope gotcha.
# ci: re-scope to redeploy with the @saas/db jsonb-insert fix (PR #61) —
# deps/labels were stored as jsonb scalar strings (double-encoded), breaking
# the runnable/claim deps guard; same packages/* -> consumer rescope gotcha.
