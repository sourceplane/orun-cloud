apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: api-edge
  description: Cloudflare Worker for the API edge Runtime
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/api-edge
  dependsOn:
    - component: cloudflare-hyperdrive
    - component: cloudflare-kv
    - component: projects-worker
    - component: events-worker
    - component: config-worker
    - component: webhooks-worker
    - component: billing-worker
    - component: integrations-worker
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"

    workspaceDir: ../..
    appDir: .

    turboFilter: "@saas/api-edge"
    wranglerConfig: wrangler.jsonc

    # BF6 deploy-time wiring (pilot): wrangler.jsonc is rendered, never
    # committed. Verify lanes render from wiring.fixture.json (offline);
    # deploy lanes resolve real IDs from the Secrets Manager wiring manifest
    # published by the named infra components (BF5).
    wranglerTemplate: wrangler.template.jsonc
    wiringComponents: "cloudflare-hyperdrive,cloudflare-kv"
    wiringEnvs: "stage,prod"
    wiringFixture: wiring.fixture.json
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: multi-tenant-saas

    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/api-edge
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/api-edge

    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod

    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: api
    runtime: cloudflare
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
# ci: trigger full-component verification (orun v2.15.0 upgrade)
