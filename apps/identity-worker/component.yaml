apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: identity-worker
  description: Cloudflare Worker for the Identity auth runtime
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/identity-worker
  dependsOn:
    - component: cloudflare-hyperdrive
    # #343: identity-worker service-binds these workers; declare them as
    # deploy-time prerequisites (Cloudflare 10143 ordering on fresh accounts).
    - component: membership-worker
    - component: policy-worker
    - component: notifications-worker
    # Schema-before-code: identity-worker reads CLI-session columns (incl. the
    # R11 reuse-grace columns from migration 240), so migrations must apply
    # before this worker's new code goes live, or refresh transiently 503s.
    - component: db-migrate
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6b: deploy-time wiring — wrangler.jsonc is rendered, never committed.
    # Verify lanes render from wiring.fixture.json (offline); deploy lanes
    # resolve real IDs from the Secrets Manager wiring manifest (BF5).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: orun-cloud

    # SS2: manifest key for the secrets-live escrow sync (saas-secrets-sync).
    secretsWorker: identity-worker
    turboFilter: "@saas/identity-worker"
    wranglerConfig: wrangler.jsonc
    wranglerTemplate: wrangler.template.jsonc
    wiringComponents: "cloudflare-hyperdrive"
    wiringEnvs: "stage,prod"
    wiringFixture: wiring.fixture.json
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/identity-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/identity-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    preDeployCommand: "echo 'No pre-deploy step configured.'"
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: identity
    runtime: cloudflare
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
# ci: redeploy with live Hyperdrive wiring (BF6b convergence)
