apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: config-worker
  description: Cloudflare Worker for the Config read-only API surface
spec:
  type: cloudflare-worker-turbo
  lifecycle: production
  owner: platform
  domain: starter-runtime
  path: apps/config-worker
  dependsOn:
    # Build inputs (dependsOn[].input, orun v2.22.0): these workspace packages
    # are bundled into this component's artifact, so a change to any of them
    # rescopes this component in --changed (no more stale-bundle deploy gaps).
    # Inert under the pinned orun v2.15.0; activates on the v2.22 CI cutover.
    - component: contracts
      input: true
    - component: db
      input: true
    - component: membership-worker
    - component: policy-worker
  subscribe:
    environments:
      - name: dev
        profile: verify
      - name: stage
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
      - name: prod
        profile: verify
        profileRules:
          - profile: deploy
            when:
              triggerRef: github-push-main
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    # BF6b: deploy-time wiring — wrangler.jsonc is rendered, never committed.
    # Verify lanes render from wiring.fixture.json (offline); deploy lanes
    # resolve real IDs from the Secrets Manager wiring manifest (BF5).
    awsAccountId: "306024784101"
    awsRegion: us-east-1
    orgName: sourceplane
    owner: sourceplane
    repo: orun-cloud

    # SS2: manifest key for the secrets-live escrow sync (saas-secrets-sync).
    secretsWorker: config-worker
    turboFilter: "@saas/config-worker"
    wranglerConfig: wrangler.jsonc
    wranglerTemplate: wrangler.template.jsonc
    wiringComponents: "cloudflare-hyperdrive"
    wiringEnvs: "stage,prod"
    wiringFixture: wiring.fixture.json
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@saas/config-worker
    typecheckCommand: pnpm exec turbo run typecheck --filter=@saas/config-worker
    dryRunCommand: pnpm exec wrangler deploy --dry-run --config wrangler.jsonc --env prod
    deployCommand: pnpm exec wrangler deploy --config wrangler.jsonc --env prod
    # Ensure the secrets-at-rest encryption key exists on every deploy target
    # before the worker ships (PX2 completion — live stage verification found
    # "Encryption is not configured"). Generate-if-missing, idempotent:
    # `wrangler secret list` is the existence probe; the key is generated in
    # CI, pushed straight to Cloudflare, and never logged or persisted
    # elsewhere. Runs only in the deploy profile (pre-deploy capability), so
    # PR/verify lanes never touch live secrets. AWS Secrets Manager escrow of
    # this key is a named follow-up (BF deploy-time wiring).
    preDeployCommand: |
      for e in stage prod; do
        if ! pnpm exec wrangler secret list --config wrangler.jsonc --env "$e" 2>/dev/null | grep -q '"SECRET_ENCRYPTION_KEY"'; then
          echo "Provisioning SECRET_ENCRYPTION_KEY for env $e"
          openssl rand -hex 32 | pnpm exec wrangler secret put SECRET_ENCRYPTION_KEY --config wrangler.jsonc --env "$e"
        else
          echo "SECRET_ENCRYPTION_KEY already present for env $e"
        fi
      done
    migrationCommand: "echo 'No migrations configured.'"
    smokeCommand: "echo 'No smoke test configured.'"
  labels:
    team: platform
    layer: runtime
    surface: config
    runtime: cloudflare
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
# ci: redeploy with live Hyperdrive wiring (BF6b convergence)
# ci: SS3 prod secrets seeded — redeploy to sync runtime secrets (secrets-live)
# ci: SM2 SECRET_KEK seeded (stage+prod) — redeploy to sync the workspace-DEK wrap key (secrets-live)
