apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: db-migrate
  description: Applies database migrations to stage and prod Supabase instances
  labels:
    domain: infra
    scope: database
    team: platform
    layer: data

spec:
  type: db-migrate
  lifecycle: production
  owner: platform
  domain: infra

  dependsOn:
    - component: db
    # Migrations read the Supabase connection from the secret `supabase` writes.
    - component: supabase

  path: packages/db/src/migrations

  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    awsRegion: us-east-1
    awsAccountId: "306024784101"
    secretName: sourceplane/multi-tenant-saas/supabase
    owner: sourceplane
    repo: multi-tenant-saas

  subscribe:
    environments:
      - name: stage
        profile: plan
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
# ci: trigger db-migrate apply — integrations migrations 180+190 were never applied (--changed planning keys off this directory, not spec.path)
