apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: db-migrate
  description: Applies database migrations to stage and prod Supabase instances
  labels:
    domain: infra
    scope: database
    team: platform
    layer: data

spec:
  type: db-migrate
  lifecycle: production
  owner: platform
  domain: infra

  dependsOn:
    - component: db
    # Migrations read the Supabase connection from the secret `supabase` writes.
    - component: supabase

  path: packages/db/src/migrations

  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    awsRegion: us-east-1
    awsAccountId: "306024784101"
    secretName: sourceplane/orun-cloud/supabase
    owner: sourceplane
    repo: orun-cloud

  subscribe:
    environments:
      - name: stage
        profile: plan
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
# Change-detection note: orun's `--changed` planner schedules this component when
# files in THIS directory change, NOT its spec.path (packages/db/src/migrations).
# Historically that meant new migrations (180/190, 220/230, first-boot) silently
# never applied — the plan didn't include db-migrate, and apply only runs on merge.
# Fix: `migrations.lock` in this directory mirrors the migration set and is
# regenerated whenever a migration is added (`pnpm --filter @saas/db gen:migrations-lock`,
# enforced by tests/db/src/migrations.test.ts). So adding a migration now changes a
# file here → db-migrate is planned (PR) and applied (merge) automatically. Do not
# hand-add ad-hoc trigger comments; update the lock instead.
