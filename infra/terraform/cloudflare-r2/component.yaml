apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: cloudflare-r2
  description: Provisions the Cloudflare R2 bucket backing the state-worker object/log store (orun-state, stage and prod)
  labels:
    domain: infra
    scope: state-object-log-store

spec:
  type: terraform
  lifecycle: production
  owner: platform
  domain: infra

  parameters:
    orgName: sourceplane
    stackName: cloudflare-r2
    terraformDir: terraform
    terraformVersion: "1.15.3"

  env:
    AWS_EC2_METADATA_DISABLED: "true"


  subscribe:
    environments:
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

# Prerequisite: R2 must be enabled on the Cloudflare account (Dashboard →
# Account → R2). Until then `cloudflare_r2_bucket` apply fails with
# "Please enable R2 through the Cloudflare Dashboard [code: 10042]", which
# cascades into state-worker (binds ORUN_STATE) and api-edge (binds
# STATE_WORKER). R2 enabled 2026-06-15; this re-scopes the component so the
# orun-state buckets get created on the next merge.
