apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: cloudflare-kv
  description: Provisions Cloudflare KV namespaces backing the api-edge idempotency replay store (stage and prod)
  labels:
    domain: infra
    scope: edge-idempotency-replay-store

spec:
  type: terraform
  lifecycle: production
  owner: platform
  domain: infra

  parameters:
    orgName: sourceplane
    stackName: cloudflare-kv
    terraformDir: terraform
    terraformVersion: "1.15.3"

  env:
    AWS_EC2_METADATA_DISABLED: "true"


  subscribe:
    environments:
      - name: stage
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main

      - name: prod
        profile: plan-only
        profileRules:
          - profile: apply
            when:
              triggerRef: github-push-main
