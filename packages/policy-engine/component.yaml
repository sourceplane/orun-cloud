apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: policy-engine
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-shared
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "22"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
  labels:
    team: platform
    layer: shared
    surface: policy
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
