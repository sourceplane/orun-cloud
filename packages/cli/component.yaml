apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: cli
  description: First-class TypeScript CLI for the Orun Cloud control plane API
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-cli
  dependsOn:
    # Build inputs (dependsOn[].input, orun v2.22.0): these workspace packages
    # are bundled into this component's artifact, so a change to any of them
    # rescopes this component in --changed (no more stale-bundle deploy gaps).
    # Inert under the pinned orun v2.15.0; activates on the v2.22 CI cutover.
    - component: sdk
      input: true
    - component: webhook-verifier
      input: true
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: shared
    surface: cli
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
