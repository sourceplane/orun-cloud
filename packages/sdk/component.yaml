apiVersion: sourceplane.io/v1
kind: Component
metadata:
  name: sdk
  description: Runtime-agnostic TypeScript SDK for the Sourceplane control plane API
spec:
  type: turbo-package
  lifecycle: production
  owner: platform
  domain: starter-sdk
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: stage
        profile: quick-check
      - name: prod
        profile: quick-check
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    preBuildCommand: pnpm exec turbo run test --filter=./
  labels:
    team: platform
    layer: shared
    surface: sdk
# ci: trigger full-component verification (orun v2.12.0 upgrade — PR #183)
