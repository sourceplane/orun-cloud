name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      job-matrix: ${{ steps.matrix.outputs.job-matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: sourceplane/orun-action@v1.2.0
        with:
          version: v2.15.0
      - run: |
          set -euo pipefail

          plan_args=(
            --from-ci github
            --event-file "$GITHUB_EVENT_PATH"
            --intent intent.yaml
            --output plan.json
            --changed
          )

          orun plan "${plan_args[@]}"
      - id: matrix
        run: |
         echo "job-matrix=$(jq -c '[.jobs[] | {"job-id": .id, "job-name": .checkName}]' plan.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: orun-plan
          path: plan.json

  run:
    needs: plan
    runs-on: ubuntu-latest
    if: ${{ needs.plan.outputs.job-matrix != '[]' && needs.plan.outputs.job-matrix != '' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.job-matrix) }}
    name: ${{ matrix.job-name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: orun-plan
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sourceplane/orun-action@v1.2.0
        with:
          version: v2.15.0
      - run: |
          orun run \
            --plan plan.json \
            --runner github-actions \
            --remote-state \
            --job "${{ matrix.job-id }}" \
            --exec-id "${{ github.run_id }}-${{ github.run_attempt }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_API_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOCKER_CONFIG: /home/runner/.docker
