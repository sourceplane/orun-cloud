apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: admin-console-pages-git

spec:
  type: cloudflare-pages-turbo-terraform
  lifecycle: production
  owner: platform
  domain: platform-ui
  path: apps/admin-console
  subscribe:
    environments:
      - name: staging
        profile: verify
      - name: production
        profile: release
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    workspaceDir: ../..
    appDir: .
    turboFilter: "@example/admin-console"
    outputDir: dist
    destinationDir: dist
    rootDir: .
    terraformDir: ../../infra/cloudflare-pages-admin-console
    terraformVersion: 1.9.8
    projectName: example-platform-admin-console
    deployBranch: main
    repoOwner: sourceplane
    repoName: example-platform-repo
    cloudflareBuildCommand: corepack enable && pnpm turbo run build --filter=@example/admin-console
    installCommand: pnpm install --frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=@example/admin-console
  labels:
    team: platform
    layer: foundation
    surface: admin-console
    runtime: cloudflare
