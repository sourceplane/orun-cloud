apiVersion: sourceplane.io/v1alpha1
kind: JobTemplate
metadata:
  name: cloudflare-worker-turbo-verify-deploy
spec:
  description: Capability-tagged atomic steps for Cloudflare Worker with Turborepo
  runsOn: ubuntu-22.04
  timeout: 30m
  retries: 0

  labels:
    scope: delivery

  capabilities:
    - cloudflare-worker-turbo.setup-node
    - cloudflare-worker-turbo.setup-pnpm
    - cloudflare-worker-turbo.install
    - cloudflare-worker-turbo.verify-structure
    - cloudflare-worker-turbo.wire-fixture
    - cloudflare-worker-turbo.build
    - cloudflare-worker-turbo.typecheck
    - cloudflare-worker-turbo.deploy-dry-run
    - cloudflare-worker-turbo.wire-credentials
    - cloudflare-worker-turbo.wire-live
    - cloudflare-worker-turbo.pre-deploy
    - cloudflare-worker-turbo.migrate
    - cloudflare-worker-turbo.deploy
    - cloudflare-worker-turbo.secrets-live
    - cloudflare-worker-turbo.smoke

  steps:
    - id: setup-node
      name: setup-node
      capability: cloudflare-worker-turbo.setup-node
      use: actions/setup-node@v6
      with:
        node-version: "{{ .parameters.nodeVersion }}"

    - id: setup-pnpm
      name: setup-pnpm
      capability: cloudflare-worker-turbo.setup-pnpm
      use: pnpm/action-setup@v4
      with:
        version: "{{ .parameters.pnpmVersion }}"

    - id: install-workspace-dependencies
      name: install-workspace-dependencies
      capability: cloudflare-worker-turbo.install
      shell: bash
      run: "{{ .parameters.installCommand }}"
      onFailure: stop

    - id: verify-worker-structure
      name: verify-worker-structure
      capability: cloudflare-worker-turbo.verify-structure
      shell: bash
      run: |
        test -f package.json
        {{- if .parameters.wranglerTemplate }}
        # BF6: templated worker — the committed artifact is the template; the
        # deployable config is rendered by wire-fixture/wire-live. Guard: a
        # template must never carry committed 32-hex resource IDs.
        test -f "{{ .parameters.wranglerTemplate }}"
        if grep -nE '"id":[[:space:]]*"[0-9a-f]{32}"' "{{ .parameters.wranglerTemplate }}"; then
          echo "verify-worker-structure: committed resource IDs found in {{ .parameters.wranglerTemplate }} — use @@wiring(...)@@ tokens" >&2
          exit 1
        fi
        {{- else }}
        test -f "{{ .parameters.wranglerConfig }}"
        {{- end }}
      onFailure: stop

    - id: wire-fixture
      name: wire-fixture
      capability: cloudflare-worker-turbo.wire-fixture
      shell: bash
      run: |
        {{- if .parameters.wranglerTemplate }}
        node {{ .parameters.workspaceDir }}/tooling/wire/render.mjs \
          --template "{{ .parameters.wranglerTemplate }}" \
          --out "{{ .parameters.wranglerConfig }}" \
          --map "{{ .parameters.wiringFixture }}"
        {{- else }}
        echo "wire-fixture: component is not wiring-templated; skipping."
        {{- end }}
      onFailure: stop

    - id: build-worker
      name: build-worker
      capability: cloudflare-worker-turbo.build
      shell: bash
      run: "{{ .parameters.buildCommand }}"
      onFailure: stop

    - id: typecheck-worker
      name: typecheck-worker
      capability: cloudflare-worker-turbo.typecheck
      shell: bash
      run: "{{ .parameters.typecheckCommand }}"
      onFailure: stop

    - id: deploy-dry-run
      name: deploy-dry-run
      capability: cloudflare-worker-turbo.deploy-dry-run
      shell: bash
      run: "pnpm exec wrangler deploy --dry-run --config {{ .parameters.wranglerConfig }} --env {{ .orun.environment.name }}"
      onFailure: stop

    - id: wire-credentials
      name: wire-credentials
      capability: cloudflare-worker-turbo.wire-credentials
      use: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: "arn:aws:iam::{{.parameters.awsAccountId}}:role/{{.orun.environment.name}}-github-{{.parameters.owner}}-{{.parameters.repo}}-plan"
        aws-region: "{{.parameters.awsRegion}}"
        audience: sts.amazonaws.com
      onFailure: stop

    - id: wire-live
      name: wire-live
      capability: cloudflare-worker-turbo.wire-live
      shell: bash
      run: |
        {{- if .parameters.wranglerTemplate }}
        {{- if .parameters.wiringComponents }}
        set -euo pipefail
        wiring_dir=$(mktemp -d)
        for comp in $(echo "{{ .parameters.wiringComponents }}" | tr ',' ' '); do
          for wenv in $(echo "{{ .parameters.wiringEnvs }}" | tr ',' ' '); do
            aws secretsmanager get-secret-value \
              --secret-id "{{ .parameters.orgName }}/{{ .parameters.repo }}/${comp}/${wenv}" \
              --query SecretString --output text > "${wiring_dir}/${comp}__${wenv}.json"
          done
        done
        node {{ .parameters.workspaceDir }}/tooling/wire/render.mjs \
          --template "{{ .parameters.wranglerTemplate }}" \
          --out "{{ .parameters.wranglerConfig }}" \
          --secrets-dir "${wiring_dir}"
        {{- else }}
        # Vars-only template (no @@wiring@@ tokens, no wiringComponents): there are
        # no Secrets Manager documents to fetch, so render from the committed
        # fixture — same as wire-fixture. Without this an empty component segment
        # produces an invalid GetSecretValue name ("<org>/<repo>//<env>").
        node {{ .parameters.workspaceDir }}/tooling/wire/render.mjs \
          --template "{{ .parameters.wranglerTemplate }}" \
          --out "{{ .parameters.wranglerConfig }}" \
          --map "{{ .parameters.wiringFixture }}"
        {{- end }}
        {{- else }}
        echo "wire-live: component is not wiring-templated; skipping."
        {{- end }}
      onFailure: stop

    - id: pre-deploy
      name: pre-deploy
      capability: cloudflare-worker-turbo.pre-deploy
      shell: bash
      run: "{{ .parameters.preDeployCommand }}"
      onFailure: stop

    - id: migrate
      name: migrate
      capability: cloudflare-worker-turbo.migrate
      shell: bash
      run: "{{ .parameters.migrationCommand }}"
      onFailure: stop

    - id: deploy
      name: deploy
      capability: cloudflare-worker-turbo.deploy
      shell: bash
      run: |
        : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required}"
        : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required}"
        pnpm exec wrangler deploy --config {{ .parameters.wranglerConfig }} --env {{ .orun.environment.name }}
      onFailure: stop

    - id: secrets-live
      name: secrets-live
      capability: cloudflare-worker-turbo.secrets-live
      shell: bash
      run: |
        {{- if .parameters.secretsWorker }}
        # SS2/SS6b: hydrate this worker's runtime secrets from AWS Secrets
        # Manager. The storage layout is per-integration documents
        # (<org>/<repo>/integrations/<name>/<env>) plus a single
        # <org>/<repo>/platform-secrets/<env> doc for non-integration secrets;
        # assemble.mjs (SS6a) projects them into the per-worker shape sync.mjs
        # consumes. Runs after deploy so a first-boot worker exists before
        # secrets are pushed; `wrangler secret bulk` rolls a new version
        # immediately, so smoke still observes the synced state.
        #
        # Transition contract:
        #   - No integration/platform docs seeded for ${env_name} at all =
        #     pre-SS3 state; clean-skip, leave existing wrangler-put secrets.
        #   - Any doc seeded but not all required ones = hard-fail (never
        #     deploy a worker with known-incomplete secrets — assemble.mjs
        #     fails closed and lists exactly what's missing).
        set -euo pipefail
        env_name="{{ .orun.environment.name }}"
        record_id="{{ .parameters.orgName }}/{{ .parameters.repo }}/worker-secrets-fingerprints/${env_name}"
        work_dir=$(mktemp -d)
        docs_dir="${work_dir}/docs"
        mkdir -p "${docs_dir}"
        node {{ .parameters.workspaceDir }}/tooling/secrets-sync/assemble.mjs \
          --list-docs --env "${env_name}" > "${work_dir}/doclist.txt"
        while IFS=$'\t' read -r name secret_id; do
          [ -z "${name}" ] && continue
          if aws secretsmanager get-secret-value --secret-id "${secret_id}" \
                --query SecretString --output text \
                > "${docs_dir}/${name}.json" 2>"${work_dir}/aws.err"; then
            :
          elif grep -q "ResourceNotFoundException" "${work_dir}/aws.err"; then
            rm -f "${docs_dir}/${name}.json"
            echo "secrets-live: ${name}.json absent (${secret_id})"
          else
            echo "secrets-live: failed to fetch ${secret_id}:" >&2
            cat "${work_dir}/aws.err" >&2
            exit 1
          fi
        done < "${work_dir}/doclist.txt"
        fetched=$(find "${docs_dir}" -maxdepth 1 -type f -name '*.json' | wc -l | tr -d ' ')
        if [ "${fetched}" = "0" ]; then
          echo "secrets-live: no integration or platform documents seeded for ${env_name} (SS3 not started) — leaving existing worker secrets untouched."
          exit 0
        fi
        node {{ .parameters.workspaceDir }}/tooling/secrets-sync/assemble.mjs \
          --env "${env_name}" --docs-dir "${docs_dir}" \
          --out-secrets "${work_dir}/escrow.json" \
          --out-config "${work_dir}/config.json"
        aws secretsmanager get-secret-value --secret-id "${record_id}" \
          --query SecretString --output text > "${work_dir}/record.json" 2>/dev/null \
          || echo '{}' > "${work_dir}/record.json"
        node {{ .parameters.workspaceDir }}/tooling/secrets-sync/sync.mjs \
          --manifest {{ .parameters.workspaceDir }}/tooling/secrets-sync/secrets.manifest.json \
          --worker "{{ .parameters.secretsWorker }}" \
          --env "${env_name}" \
          --escrow "${work_dir}/escrow.json" \
          --record "${work_dir}/record.json" \
          --out-bulk "${work_dir}/bulk.json" \
          --out-record "${work_dir}/record.next.json"
        if [ "$(cat "${work_dir}/bulk.json")" != "{}" ]; then
          pnpm exec wrangler secret bulk "${work_dir}/bulk.json" \
            --config {{ .parameters.wranglerConfig }} --env "${env_name}"
          aws secretsmanager put-secret-value --secret-id "${record_id}" \
            --secret-string "file://${work_dir}/record.next.json" >/dev/null 2>&1 \
            || aws secretsmanager create-secret --name "${record_id}" \
                 --secret-string "file://${work_dir}/record.next.json" >/dev/null
        fi
        rm -rf "${work_dir}"
        {{- else }}
        echo "secrets-live: component has no managed runtime secrets; skipping."
        {{- end }}
      onFailure: stop

    - id: smoke
      name: smoke
      capability: cloudflare-worker-turbo.smoke
      shell: bash
      run: "{{ .parameters.smokeCommand }}"
      onFailure: stop
