apiVersion: sourceplane.io/v1alpha1
kind: ComponentSchema
metadata:
  name: cloudflare-domain-component
spec:
  type: cloudflare-domain
  schema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Cloudflare Domain Component
    type: object
    required:
      - name
      - type
      - parameters
    properties:
      name:
        type: string
      type:
        type: string
        const: cloudflare-domain
      parameters:
        type: object
        required:
          - stackName
          - terraformDir
          - terraformVersion
          - baseDomain
          - zoneMode
          - pagesProjectPrefix
        properties:
          stackName:
            type: string
          terraformDir:
            type: string
          terraformVersion:
            type: string
          awsAccountId:
            type: string
            description: AWS account ID hosting the GitHub-OIDC role this component assumes
          awsRegion:
            type: string
          orgName:
            type: string
          owner:
            type: string
          repo:
            type: string
          namespace:
            type: string
          namespacePrefix:
            type: string
          baseDomain:
            type: string
            description: The root domain managed by this component (e.g. sourceplane.ai)
          zoneMode:
            type: string
            enum:
              - existing
              - managed
            description: >-
              "existing" adopts a zone already present in Cloudflare (no zone creation).
              "managed" creates and manages the zone lifecycle via Terraform.
          pagesProjectPrefix:
            type: string
            description: >-
              Pages project name prefix. The full project name is derived as
              {pagesProjectPrefix}-{environment} at plan time.
        additionalProperties: true
    additionalProperties: true
