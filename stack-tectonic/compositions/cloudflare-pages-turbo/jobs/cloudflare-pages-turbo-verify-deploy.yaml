apiVersion: sourceplane.io/v1alpha1
kind: JobTemplate
metadata:
  name: cloudflare-pages-turbo-verify-deploy
spec:
  description: Capability-tagged atomic steps for Cloudflare Pages with Turborepo
  runsOn: ubuntu-22.04
  timeout: 30m
  retries: 0

  labels:
    scope: delivery

  capabilities:
    - cloudflare-pages-turbo.setup-node
    - cloudflare-pages-turbo.setup-pnpm
    - cloudflare-pages-turbo.install
    - cloudflare-pages-turbo.verify-structure
    - cloudflare-pages-turbo.build
    - cloudflare-pages-turbo.verify-output
    - cloudflare-pages-turbo.provision
    - cloudflare-pages-turbo.deploy
    - cloudflare-pages-turbo.smoke

  steps:
    - id: setup-node
      name: setup-node
      capability: cloudflare-pages-turbo.setup-node
      use: actions/setup-node@v6
      with:
        node-version: "{{ .parameters.nodeVersion }}"

    - id: setup-pnpm
      name: setup-pnpm
      capability: cloudflare-pages-turbo.setup-pnpm
      use: pnpm/action-setup@v4
      with:
        version: "{{ .parameters.pnpmVersion }}"

    - id: install-workspace-dependencies
      name: install-workspace-dependencies
      capability: cloudflare-pages-turbo.install
      shell: bash
      run: "{{ .parameters.installCommand }}"
      onFailure: stop

    - id: verify-pages-app-structure
      name: verify-pages-app-structure
      capability: cloudflare-pages-turbo.verify-structure
      shell: bash
      run: test -f package.json
      onFailure: stop

    - id: build-pages-app
      name: build-pages-app
      capability: cloudflare-pages-turbo.build
      shell: bash
      run: |
        {{- if .parameters.environmentBuildVar }}
        export {{ .parameters.environmentBuildVar }}="{{ .orun.environment.name }}"
        {{- end }}
        {{ .parameters.buildCommand }}
      onFailure: stop

    - id: verify-build-output
      name: verify-build-output
      capability: cloudflare-pages-turbo.verify-output
      shell: bash
      run: |
        test -d "{{ .parameters.outputDir }}"
        find "{{ .parameters.outputDir }}" -maxdepth 2 -type f | head -n 20
      onFailure: stop

    - id: ensure-pages-project
      name: ensure-pages-project
      capability: cloudflare-pages-turbo.provision
      shell: bash
      run: |
        : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required}"
        : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required}"

        {{- if .parameters.environmentAwareProjectName }}
        PROJECT_NAME="{{ .parameters.projectName }}-{{ .orun.environment.name }}"
        {{- else }}
        PROJECT_NAME="{{ .parameters.projectName }}"
        {{- end }}

        api_root="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
        response_file="${RUNNER_TEMP:-/tmp}/cloudflare-pages-project.json"
        status="$(curl -sS -o "${response_file}" -w "%{http_code}" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" \
          "${api_root}/${PROJECT_NAME}")"

        if [ "${status}" = "200" ]; then
          echo "Pages project ${PROJECT_NAME} already exists."
        elif [ "${status}" = "404" ]; then
          curl -sS --fail -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${PROJECT_NAME}\",\"production_branch\":\"{{ .parameters.deployBranch }}\"}" \
            "${api_root}" >/dev/null
          echo "Created Pages project ${PROJECT_NAME}."
        else
          cat "${response_file}"
          exit 1
        fi

        curl -sS --fail -X PATCH \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" \
          --data '{"production_branch":"{{ .parameters.deployBranch }}"}' \
          "${api_root}/${PROJECT_NAME}" >/dev/null
      onFailure: stop

    - id: deploy-pages-artifact
      name: deploy-pages-artifact
      capability: cloudflare-pages-turbo.deploy
      shell: bash
      run: |
        : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required}"
        : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required}"

        {{- if .parameters.environmentAwareProjectName }}
        PROJECT_NAME="{{ .parameters.projectName }}-{{ .orun.environment.name }}"
        {{- else }}
        PROJECT_NAME="{{ .parameters.projectName }}"
        {{- end }}

        pnpm exec wrangler pages deploy "{{ .parameters.outputDir }}" \
          --project-name "${PROJECT_NAME}" \
          --branch "{{ .parameters.deployBranch }}"
      onFailure: stop

    - id: smoke
      name: smoke
      capability: cloudflare-pages-turbo.smoke
      shell: bash
      run: |
        export ORUN_ENVIRONMENT="{{ .orun.environment.name }}"
        {{- if .parameters.environmentAwareProjectName }}
        export EFFECTIVE_PROJECT_NAME="{{ .parameters.projectName }}-{{ .orun.environment.name }}"
        {{- else }}
        export EFFECTIVE_PROJECT_NAME="{{ .parameters.projectName }}"
        {{- end }}
        {{ .parameters.smokeCommand }}
      onFailure: stop
